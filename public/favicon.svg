<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" stroke-linecap="butt" stroke-linejoin="miter">
  <!-- Tall asymmetric left peak -->
  <path d="M 3 26 L 10 4 L 14 18"
        stroke="#F1F5F9"
        stroke-width="3.5"
        fill="none"/>

  <!-- Dominant semantic break marker -->
  <line x1="17" y1="4" x2="17" y2="28"
        stroke="#F1F5F9"
        stroke-width="4"/>

  <!-- Shallow right fall — asymmetric vs left peak -->
  <path d="M 21 18 L 27 26"
        stroke="#F1F5F9"
        stroke-width="3.5"
        fill="none"/>
</svg>
