<svg viewBox="0 0 64 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Ascending spike (left) -->
  <path d="M 4 24 L 12 20 L 20 8"
        stroke="#F1F5F9"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Semantic break marker at peak -->
  <line x1="24" y1="6" x2="24" y2="14"
        stroke="#F1F5F9"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Descending spike (right) — different angle, asymmetric -->
  <path d="M 28 10 L 36 22 L 44 18 L 60 24"
        stroke="#F1F5F9"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
